name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write       # Required for Changesets to push branches
  id-token: write       # Required for OIDC authentication
  pull-requests: write  # Required for Changesets to create PRs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changesets:
    name: changeset release
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    environment:
      name: npm-ucp-cli
      url: https://www.npmjs.com/package/@shopify/ucp-cli
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.28.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure public npm registry
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          userconfig="$RUNNER_TEMP/npm-public.npmrc"
          {
            echo '@shopify:registry=https://registry.npmjs.org/'
            echo 'registry=https://registry.npmjs.org/'
            if [[ -n "${NPM_TOKEN:-}" ]]; then
              printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN"
            fi
          } > "$userconfig"
          echo "NPM_CONFIG_USERCONFIG=$userconfig" >> "$GITHUB_ENV"
      - uses: changesets/action@8eb63fb4cfc7f9643537c7d39d0b68c835012a19 # v1.5.3
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          NPM_TOKEN: ""
          NODE_AUTH_TOKEN: ""
